events {
    worker_connections 1024;
}

http {
    upstream app_server {
        server 127.0.0.1:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Serve static files from host application
        location / {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve modules/remoteEntry.js from host application
        location /modules/remoteEntry.js {
            proxy_pass http://app_server/modules/remoteEntry.js;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Other module routes should be handled by the host application
        location /modules/ {
            proxy_pass http://app_server/modules/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
